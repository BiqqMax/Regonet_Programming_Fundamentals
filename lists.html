<!DOCTYPE html>
<html>
 <head>
    <title>Lists </title>
 </head>
 <body>
    <!-- This is unordered list -->
    <ul>
        <li>Rice</li>
        <li>Beans</li>
        <li>Yam</li>
    </ul>

    <!-- This is an ordered list -->
    <ol>
        <li>Rice</li>
        <li>Beans</li>
        <li>Yam</li>
    </ol>


    <!-- This is a nested unordered inside ordered list -->
    <ol>


        <li>Nigeria</li>
            <ul>
                <li>Lagos</li>
                <li>Ogun</li>
                <li>Oyo</li>
            </ul>
            
        <li>Ghana</li>
                <ul>
                <li>Accra</li>
                <li>Kasoa</li>
                <li>Kumasi</li>
                </ul>
        <li>France</li>
                <ul>
                <li>Grand Est</li>
                <li>Corsica</li>
                <li>Occitanie</li>
                </ul>

    </ol>

 </body>

 


</html>
