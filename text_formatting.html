 <!DOCTYPE html>
 <html>
    <head>
        <title>Text Formatting</title>

    </head>
    <body>
     <p><b>This is a BOLD text</b> </p>     <!--the <b> </b> signifies bold  -->
        <p><u>This is an UNDERLINED Text</u></p>
        <p><i>This is an ITALIC Text</i></p>
        <p><em>This is an EMPHASIZED Text</em></p>
        <p> <strong> This a STRONG Text</strong></p>
        <!-- The examples above are BLOCK element.
        They don't share line with others unlike the span below -->

        <span>This is a span tag with text inside of it</span>
        <span>This is another span text </span>

    </body>
